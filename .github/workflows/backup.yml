# ============================================================
# Weekly D1 Database Backup
# Runs every Sunday at 02:00 UTC.
# Uses the existing scripts/backup-d1.ts to export all tables
# and uploads the JSON backup to R2 for safekeeping.
#
# D1 Time Travel (30-day retention) is the primary safety net;
# this workflow provides an independent off-D1 backup.
#
# Required GitHub Actions secrets:
#   NEXUS_STORAGE_URL  — deployed nexus-storage worker URL
#   DASHBOARD_SECRET   — auth token for the storage API
#   CLOUDFLARE_API_TOKEN — Wrangler auth (for R2 upload)
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account ID
# ============================================================

name: Weekly D1 Backup

on:
  schedule:
    - cron: "0 2 * * 0"   # Every Sunday at 02:00 UTC
  workflow_dispatch:        # Allow manual trigger

defaults:
  run:
    working-directory: nexus

jobs:
  backup:
    name: Export D1 & upload to R2
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('nexus/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run D1 backup script
        env:
          NEXUS_STORAGE_URL: ${{ secrets.NEXUS_STORAGE_URL }}
          DASHBOARD_SECRET: ${{ secrets.DASHBOARD_SECRET }}
        run: npx tsx scripts/backup-d1.ts > /tmp/d1-backup.json

      - name: Upload backup to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d_%H%M%S")
          npx wrangler r2 object put "nexus-backups/d1-backup-${TIMESTAMP}.json" \
            --file=/tmp/d1-backup.json \
            --content-type="application/json"
          echo "Backup uploaded: d1-backup-${TIMESTAMP}.json"

      - name: Backup summary
        run: |
          echo "Backup complete"
          ls -lh /tmp/d1-backup.json
          echo "Tables backed up:"
          python3 -c "import json; d=json.load(open('/tmp/d1-backup.json')); [print(f'  {k}: {v} rows') for k,v in d['rowCounts'].items()]"
