# ============================================================
# NEXUS — Auto-Deploy Pipeline
# ============================================================
# Runs after CI passes on push to main.
# Deploys all 5 workers + frontend to Cloudflare.
#
# Required GitHub Secrets:
#   CLOUDFLARE_API_TOKEN  — API token with Workers/Pages/D1/KV/R2 permissions
#   CLOUDFLARE_ACCOUNT_ID — Your Cloudflare account ID
#
# How to set up:
#   1. Go to https://dash.cloudflare.com/profile/api-tokens
#   2. Create a token with these permissions:
#      - Account > Workers Scripts > Edit
#      - Account > Workers KV Storage > Edit
#      - Account > D1 > Edit
#      - Account > Cloudflare Pages > Edit
#      - Account > Workers R2 Storage > Edit
#   3. Go to your GitHub repo → Settings → Secrets → Actions
#   4. Add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID
# ============================================================

name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'nexus/**'
  workflow_dispatch: # Allow manual trigger from GitHub UI

# Only one deploy at a time
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # CI must pass first
  ci:
    name: CI Check
    uses: ./.github/workflows/ci.yml

  # Run migrations after CI passes
  migrate:
    name: Run D1 Migrations
    needs: ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexus

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure _migrations tracking table exists
        run: npx wrangler d1 execute nexus-db --file=migrations/000_migrations_tracker.sql --remote

      - name: Run all D1 migrations
        run: |
          for migration in $(ls migrations/*.sql | sort); do
            name=$(basename "$migration")
            # Skip if already applied
            applied=$(npx wrangler d1 execute nexus-db --command "SELECT 1 FROM _migrations WHERE name='$name'" --remote --json 2>/dev/null || echo "[]")
            if echo "$applied" | grep -q '"1"'; then
              echo "Skipping $name (already applied)"
              continue
            fi
            echo "Running $migration..."
            npx wrangler d1 execute nexus-db --file="$migration" --remote
            npx wrangler d1 execute nexus-db --command "INSERT OR IGNORE INTO _migrations (name) VALUES ('$name')" --remote
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # Deploy workers in dependency order
  deploy-workers:
    name: Deploy Workers
    needs: migrate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexus

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Deploy in dependency order (sequential — each depends on the previous)
      - name: Deploy nexus-storage
        run: cd apps/workers/nexus-storage && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy nexus-ai
        run: cd apps/workers/nexus-ai && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy nexus-variation
        run: cd apps/workers/nexus-variation && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy nexus-workflow
        run: cd apps/workers/nexus-workflow && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy nexus-router
        run: cd apps/workers/nexus-router && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # Deploy frontend to CF Pages
  deploy-frontend:
    name: Deploy Frontend
    needs: deploy-workers
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexus

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build
        env:
          NEXT_PUBLIC_API_URL: https://nexus-router.professional-inbox-simo.workers.dev/api

      - name: Deploy to CF Pages
        run: cd apps/web && npx wrangler pages deploy out --project-name=nexus-dashboard
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # Post-deploy health check
  verify:
    name: Verify Deployment
    needs: [deploy-workers, deploy-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Wait for workers to propagate
        run: sleep 10

      - name: Health check
        run: |
          echo "Deployment complete!"
          echo ""
          echo "Verify manually:"
          echo "  curl https://nexus-router.<your-subdomain>.workers.dev/health"
          echo "  Visit your CF Pages dashboard URL"
