name = "nexus-ai"
main = "src/index.ts"
compatibility_date = "2025-04-01"

# ── Workers AI binding (on-platform, no API key needed) ──
[ai]
binding = "AI"

# ── AI Gateway (free logging, caching, rate limiting) ──
# Create via: CF Dashboard → AI → AI Gateway → Create gateway "nexus-gateway"
# Then set the gateway ID below
[vars]
AI_GATEWAY_ID = "nexus-gateway"
# CF_ACCOUNT_ID is set via: wrangler secret put CF_ACCOUNT_ID

# ── D1 Database (health scores, analytics) ──
[[d1_databases]]
binding = "DB"
database_name = "nexus-db"
database_id = "f73cd60b-1baa-4e80-8e13-afb88960051d"
# Replace placeholder-d1-id after running: wrangler d1 create nexus-db

# ── KV Namespace (AI response cache) ──
[[kv_namespaces]]
binding = "KV"
id = "4b1067e47d0e4cbd8c7c91592ba5238c"
# Replace placeholder-kv-id after running: wrangler kv namespace create CACHE

# ── Service Binding to nexus-storage (for D1/KV writes) ──
[[services]]
binding = "NEXUS_STORAGE"
service = "nexus-storage"

