name = "nexus-variation"
main = "src/index.ts"
compatibility_date = "2025-04-01"

# ── Service Bindings (free internal routing) ──

[[services]]
binding = "NEXUS_AI"
service = "nexus-ai"

[[services]]
binding = "NEXUS_STORAGE"
service = "nexus-storage"

# ── KV Namespace (fast config reads: platform rules, social channel rules) ──
[[kv_namespaces]]
binding = "KV"
id = "placeholder-kv-id"
# Replace placeholder-kv-id after running: wrangler kv namespace create CACHE
