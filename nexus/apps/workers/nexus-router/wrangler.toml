name = "nexus-router"
main = "src/index.ts"
compatibility_date = "2024-12-30"

# ── Service Bindings to other workers (free internal calls) ──

[[services]]
binding = "AI_SERVICE"
service = "nexus-ai"

[[services]]
binding = "WORKFLOW_SERVICE"
service = "nexus-workflow"

[[services]]
binding = "VARIATION_SERVICE"
service = "nexus-variation"

[[services]]
binding = "STORAGE_SERVICE"
service = "nexus-storage"

# ── Auth secret for dashboard access ──
# Set via: wrangler secret put DASHBOARD_SECRET
[vars]
# DASHBOARD_SECRET is stored as a secret, not a var
