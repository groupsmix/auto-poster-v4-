name = "nexus-router"
main = "src/index.ts"
compatibility_date = "2024-12-30"

# Service Bindings to all internal workers
[[services]]
binding = "NEXUS_AI"
service = "nexus-ai"

[[services]]
binding = "NEXUS_WORKFLOW"
service = "nexus-workflow"

[[services]]
binding = "NEXUS_VARIATION"
service = "nexus-variation"

[[services]]
binding = "NEXUS_STORAGE"
service = "nexus-storage"

# Auth secret for dashboard access
# Set via: wrangler secret put DASHBOARD_SECRET
[vars]
# DASHBOARD_SECRET is stored as a secret, not a var
